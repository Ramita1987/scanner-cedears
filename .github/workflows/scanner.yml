name: Scanner CEDEARs Automatico

on:
  schedule:
    - cron: "0 13 * * 1-5"
    - cron: "15 14 * * 1-5"
    - cron: "45 19 * * 1-5"
  workflow_dispatch:
    inputs:
      session:
        description: "Sesion del scanner"
        required: true
        default: "MANUAL"
        type: choice
        options:
          - MANUAL
          - PRE-MARKET
          - APERTURA
          - CIERRE

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install yfinance pandas numpy requests openpyxl

      - name: Correr scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_WEBHOOK_URL: ${{ secrets.GOOGLE_SHEETS_WEBHOOK_URL }}
          FMP_KEY: ${{ secrets.FMP_KEY }}
        run: |
          HOUR=$(date -u +%H)
          INPUT="${{ github.event.inputs.session }}"
          if [ -n "$INPUT" ]; then
            export SESSION_NAME="$INPUT"
          elif [ "$HOUR" = "13" ]; then
            export SESSION_NAME="PRE-MARKET"
          elif [ "$HOUR" = "14" ]; then
            export SESSION_NAME="APERTURA"
          elif [ "$HOUR" = "19" ]; then
            export SESSION_NAME="CIERRE"
          else
            export SESSION_NAME="MANUAL"
          fi
          echo "Corriendo sesion: $SESSION_NAME"
          python run_scanner_ci.py
