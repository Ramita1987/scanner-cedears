<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Scanner CEDEARS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #0f1419 0%, #1a2332 100%);
            color: #00ff00;
            font-family: 'Courier New', monospace;
            padding: 20px;
            min-height: 100vh;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 20px;
        }
        h1 { font-size: 32px; color: #00d4ff; margin-bottom: 10px; }
        .status { font-size: 16px; color: #00ff00; }
        .status.closed { color: #ff0000; }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }
        button {
            padding: 15px;
            background: #00d4ff;
            color: #000;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { background: #00a8cc; transform: scale(1.05); }
        
        .section {
            background: rgba(26, 35, 50, 0.8);
            border: 2px solid #00d4ff;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section h2 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 20px;
            border-bottom: 1px solid #00d4ff;
            padding-bottom: 10px;
        }
        
        .tickers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .ticker-item {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            border-radius: 5px;
            padding: 15px;
            transition: all 0.3s;
        }
        .ticker-item:hover { 
            background: rgba(0, 212, 255, 0.2);
            transform: translateY(-5px);
        }
        .ticker-name { font-weight: bold; color: #00d4ff; font-size: 14px; }
        .ticker-price { font-size: 24px; color: #00ff00; margin: 5px 0; }
        .ticker-change { font-size: 12px; }
        .up { color: #00ff00; }
        .down { color: #ff0000; }
        
        .loading {
            text-align: center;
            color: #00ff00;
            padding: 20px;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <header>
        <h1>🤖 SCANNER CEDEARS</h1>
        <div class="status" id="market-status">⏳ Cargando estado del mercado...</div>
    </header>

    <div class="buttons">
        <button onclick="runScanner('PRE-MARKET')">🔵 Pre-Market (9:45)</button>
        <button onclick="runScanner('APERTURA')">🟢 Apertura (10:30)</button>
        <button onclick="runScanner('CIERRE')">🔴 Cierre (16:45)</button>
        <button onclick="runScanner('MANUAL')">⚡ Manual</button>
    </div>

    <div class="section">
        <h2>💲 Precios en Vivo (Últimas 24h)</h2>
        <div class="tickers-grid" id="tickers">
            <div class="loading">Cargando datos...</div>
        </div>
    </div>

    <div class="section">
        <h2>💱 Dólares Argentinos</h2>
        <div class="tickers-grid" id="currencies">
            <div class="loading">Cargando dólares...</div>
        </div>
    </div>

    <div class="section">
        <h2>📰 Últimas Noticias</h2>
        <div id="news">
            <div class="loading">Cargando noticias...</div>
        </div>
    </div>

    <script>
        const TICKERS = ['SPY', 'QQQ', '^DJI', '^RUT', '^VIX', '^MERV', 'GC=F', 'CL=F', 'SI=F', 'HG=F', 'BTC-USD', 'ETH-USD'];
        const CURRENCIES = ['oficial', 'blue', 'mep', 'ccl'];

        function getRandomColor() {
            const colors = ['#00ff00', '#00ffff', '#ff00ff', '#ffff00', '#ff6600', '#00ff99'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        async function loadMarketStatus() {
            try {
                const res = await fetch('/market_status');
                const data = await res.json();
                const el = document.getElementById('market-status');
                if (data.is_open) {
                    el.textContent = '🟢 MERCADO ABIERTO';
                    el.classList.remove('closed');
                } else {
                    el.textContent = '🔴 MERCADO CERRADO';
                    el.classList.add('closed');
                }
            } catch (e) {
                console.error('Error:', e);
            }
        }

        async function loadTickers() {
            try {
                const res = await fetch(`/yahoo?symbols=${TICKERS.join(',')}`);
                const data = await res.json();
                
                let html = '';
                TICKERS.forEach(t => {
                    const info = data[t] || { price: 'N/A', chg_pct: 0 };
                    const changeClass = info.chg_pct >= 0 ? 'up' : 'down';
                    const arrow = info.chg_pct >= 0 ? '📈' : '📉';
                    html += `
                        <div class="ticker-item">
                            <div class="ticker-name">${t}</div>
                            <div class="ticker-price">$${info.price}</div>
                            <div class="ticker-change ${changeClass}">${arrow} ${info.chg_pct}%</div>
                        </div>
                    `;
                });
                document.getElementById('tickers').innerHTML = html;
            } catch (e) {
                document.getElementById('tickers').innerHTML = '<div style="color: #ff0000;">Error cargando datos</div>';
            }
        }

        async function loadCurrencies() {
            try {
                const res = await fetch('/exchange_rates');
                const data = await res.json();
                
                let html = '';
                CURRENCIES.forEach(c => {
                    const info = data[c] || { price: 'N/A' };
                    html += `
                        <div class="ticker-item">
                            <div class="ticker-name">USD/${c.toUpperCase()}</div>
                            <div class="ticker-price">$${info.price}</div>
                        </div>
                    `;
                });
                document.getElementById('currencies').innerHTML = html;
            } catch (e) {
                document.getElementById('currencies').innerHTML = '<div style="color: #ff0000;">Error cargando dólares</div>';
            }
        }

        async function loadNews() {
            try {
                const res = await fetch('/news');
                const news = await res.json();
                let html = '';
                news.forEach(item => {
                    html += `<div style="margin-bottom: 15px; padding: 10px; background: rgba(0,212,255,0.05); border-left: 3px solid #00d4ff;">
                        <strong>${item.source}:</strong> ${item.title.substring(0, 100)}...
                    </div>`;
                });
                document.getElementById('news').innerHTML = html || '<div>Sin noticias disponibles</div>';
            } catch (e) {
                document.getElementById('news').innerHTML = '<div style="color: #ff0000;">Error cargando noticias</div>';
            }
        }

        function runScanner(session) {
            alert(`Scanner iniciado: ${session}`);
        }

        // Cargar datos al iniciar
        loadMarketStatus();
        loadTickers();
        loadCurrencies();
        loadNews();

        // Actualizar cada 30 segundos
        setInterval(loadMarketStatus, 30000);
        setInterval(loadTickers, 30000);
        setInterval(loadCurrencies, 30000);
        setInterval(loadNews, 300000);
    </script>
</body>
</html>
