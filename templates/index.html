<!DOCTYPE html>
<html>
<head>
    <title>Scanner CEDEARS</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: Arial; }
        .ticker { padding: 10px; margin: 5px; background: #2a2a2a; border-radius: 5px; }
        .price { font-weight: bold; color: #00ff00; }
    </style>
</head>
<body>
    <h1>🤖 Scanner CEDEARS</h1>
    <div id="status">Market Status...</div>
    <div id="tickers"></div>
    <script>
        fetch('/market_status').then(r => r.json()).then(d => document.getElementById('status').textContent = d.is_open ? '🟢 ABIERTO' : '🔴 CERRADO');
        fetch('/yahoo?symbols=SPY,QQQ').then(r => r.json()).then(d => {
            let html = '';
            for(let t in d) html += `<div class="ticker">${t}: $${d[t].price}</div>`;
            document.getElementById('tickers').innerHTML = html;
        });
    </script>
</body>
</html>
