<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner CEDEARS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { background-color: #0f1419; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #1a1f26; border-bottom: 2px solid #00d4ff; }
        .card { background-color: #1a1f26; border: 1px solid #00d4ff; }
        .btn-primary { background-color: #00d4ff; border: none; color: #000; font-weight: bold; }
        .btn-primary:hover { background-color: #00a8cc; }
        .price-up { color: #00ff00; }
        .price-down { color: #ff0000; }
        .spinner-border { color: #00d4ff; }
        .watchlist-ticker { padding: 15px; border-bottom: 1px solid #2a3035; }
        .watchlist-ticker:hover { background-color: #2a3035; }
        table { color: #fff; }
        thead { background-color: #00d4ff; color: #000; }
        .news-item { background-color: #2a3035; padding: 10px; margin-bottom: 10px; border-left: 3px solid #00d4ff; }
        .news-item a { color: #00d4ff; text-decoration: none; }
        .news-item a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">🤖 SCANNER CEDEARS</span>
            <span id="market-status" class="badge bg-danger">Mercado Cerrado</span>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <!-- PANEL DE CONTROL -->
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card p-4">
                    <h5>⚙️ Panel de Control</h5>
                    <div class="row">
                        <div class="col-md-3">
                            <button class="btn btn-primary w-100" onclick="runScanner('PRE-MARKET')">
                                🔵 Pre-Market (9:45)
                            </button>
                        </div>
                        <div class="col-md-3">
                            <button class="btn btn-primary w-100" onclick="runScanner('APERTURA')">
                                🟢 Apertura (10:30)
                            </button>
                        </div>
                        <div class="col-md-3">
                            <button class="btn btn-primary w-100" onclick="runScanner('CIERRE')">
                                🔴 Cierre (16:45)
                            </button>
                        </div>
                        <div class="col-md-3">
                            <button class="btn btn-primary w-100" onclick="runScanner('MANUAL')">
                                ⚡ Manual Ahora
                            </button>
                        </div>
                    </div>
                    <div id="scanner-status" class="mt-3"></div>
                </div>
            </div>
        </div>

        <!-- PRECIOS EN VIVO -->
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card p-4">
                    <h5>💲 Precios en Vivo (Actualización cada 30s)</h5>
                    <div id="watchlist-container" class="row"></div>
                </div>
            </div>
        </div>

        <!-- GRÁFICOS DE SECTORES -->
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card p-4">
                    <h5>📊 Gráficos de Sectores (Últimos 6 Meses)</h5>
                    <div id="charts-container"></div>
                </div>
            </div>
        </div>

        <!-- NOTICIAS -->
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card p-4">
                    <h5>📰 Noticias Financieras</h5>
                    <div id="news-container"></div>
                </div>
            </div>
        </div>

        <!-- RESULTADOS DEL SCANNER -->
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card p-4">
                    <h5>🎯 Resultados del Scanner</h5>
                    <div id="results-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const watchlistTickers = [
            'SPY', 'QQQ', '^DJI', '^RUT', '^VIX',
            '^MERV', 'GC=F', 'CL=F', 'SI=F', 'HG=F',
            'BTC-USD', 'ETH-USD'
        ];

        const currencyTickers = ['oficial', 'blue', 'mep', 'ccl'];

        // Generar colores aleatorios
        function getRandomColor() {
            const letters = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        const tickerColors = {};
        watchlistTickers.forEach(ticker => {
            tickerColors[ticker] = getRandomColor();
        });

        // Actualizar estado del mercado
        async function updateMarketStatus() {
            try {
                const res = await fetch('/market_status');
                const data = await res.json();
                const statusEl = document.getElementById('market-status');
                if (data.is_open) {
                    statusEl.textContent = '🟢 Mercado Abierto';
                    statusEl.className = 'badge bg-success';
                } else {
                    statusEl.textContent = '🔴 Mercado Cerrado';
                    statusEl.className = 'badge bg-danger';
                }
            } catch (e) {
                console.error('Error actualizando estado del mercado:', e);
            }
        }

        // Cargar precios en vivo
        async function loadWatchlist() {
            try {
                const tickersStr = watchlistTickers.join(',');
                const res = await fetch(`/yahoo?symbols=${tickersStr}`);
                const data = await res.json();
                
                let html = '';
                watchlistTickers.forEach(ticker => {
                    const info = data[ticker];
                    if (info) {
                        const color = info.chg_pct >= 0 ? 'price-up' : 'price-down';
                        const arrow = info.chg_pct >= 0 ? '📈' : '📉';
                        html += `
                            <div class="col-md-3 col-sm-6 col-12 mb-3">
                                <div class="watchlist-ticker">
                                    <strong>${ticker}</strong><br>
                                    Precio: <span class="${color}">${info.price}</span><br>
                                    Variación: <span class="${color}">${arrow} ${info.chg_pct}%</span>
                                </div>
                            </div>
                        `;
                    }
                });

                // Cargar dólares
                try {
                    const dolarRes = await fetch('/exchange_rates');
                    const dolarData = await dolarRes.json();
                    currencyTickers.forEach(ticker => {
                        if (dolarData[ticker]) {
                            const info = dolarData[ticker];
                            const color = info.chg_pct >= 0 ? 'price-up' : 'price-down';
                            const arrow = info.chg_pct >= 0 ? '📈' : '📉';
                            html += `
                                <div class="col-md-3 col-sm-6 col-12 mb-3">
                                    <div class="watchlist-ticker">
                                        <strong>USD/${ticker.toUpperCase()}</strong><br>
                                        Precio: <span class="${color}">${info.price}</span><br>
                                        Variación: <span class="${color}">${arrow} ${info.chg_pct}%</span>
                                    </div>
                                </div>
                            `;
                        }
                    });
                } catch (e) {
                    console.error('Error cargando dólares:', e);
                }

                document.getElementById('watchlist-container').innerHTML = html;
            } catch (e) {
                console.error('Error cargando watchlist:', e);
            }
        }

        // Cargar gráficos
        async function loadCharts() {
            try {
                const tickersStr = watchlistTickers.join(',');
                const res = await fetch(`/sector_data?tickers=${tickersStr}`);
                const data = await res.json();

                let html = '';
                watchlistTickers.forEach(ticker => {
                    if (data[ticker] && data[ticker].history) {
                        const dates = data[ticker].history.map(h => h.date);
                        const closes = data[ticker].history.map(h => h.close);

                        const trace = {
                            x: dates,
                            y: closes,
                            name: ticker,
                            mode: 'lines',
                            line: { color: tickerColors[ticker], width: 2 }
                        };

                        const layout = {
                            title: `${ticker} - Últimos 6 Meses`,
                            xaxis: { title: 'Fecha' },
                            yaxis: { title: 'Precio' },
                            plot_bgcolor: '#1a1f26',
                            paper_bgcolor: '#0f1419',
                            font: { color: '#fff' }
                        };

                        html += `<div id="chart-${ticker}" style="width:100%;height:400px;margin-bottom:20px;"></div>`;
                        
                        setTimeout(() => {
                            const el = document.getElementById(`chart-${ticker}`);
                            if (el) Plotly.newPlot(`chart-${ticker}`, [trace], layout, { responsive: true });
                        }, 100);
                    }
                });

                document.getElementById('charts-container').innerHTML = html;
            } catch (e) {
                console.error('Error cargando gráficos:', e);
            }
        }

        // Cargar noticias
        async function loadNews() {
            try {
                const res = await fetch('/news');
                const news = await res.json();

                let html = '<div class="row">';
                news.slice(0, 5).forEach(item => {
                    html += `
                        <div class="col-md-12">
                            <div class="news-item">
                                <strong>${item.source}:</strong> ${item.title.substring(0, 100)}...<br>
                                <small>${item.time}</small>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';

                document.getElementById('news-container').innerHTML = html;
            } catch (e) {
                console.error('Error cargando noticias:', e);
            }
        }

        // Ejecutar scanner
        async function runScanner(session) {
            try {
                const res = await fetch(`/run/${session}`, { method: 'POST' });
                const data = await res.json();
                
                const statusEl = document.getElementById('scanner-status');
                if (data.ok) {
                    statusEl.innerHTML = `<div class="alert alert-success">✅ Scanner iniciado: ${session}</div>`;
                } else {
                    statusEl.innerHTML = `<div class="alert alert-danger">❌ Error: ${data.error}</div>`;
                }
            } catch (e) {
                console.error('Error ejecutando scanner:', e);
            }
        }

        // Inicializar
        updateMarketStatus();
        loadWatchlist();
        loadCharts();
        loadNews();

        // Actualizar cada 30 segundos
        setInterval(updateMarketStatus, 30000);
        setInterval(loadWatchlist, 30000);

        // Actualizar gráficos cada 5 minutos
        setInterval(loadCharts, 300000);

        // Actualizar noticias cada 10 minutos
        setInterval(loadNews, 600000);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
